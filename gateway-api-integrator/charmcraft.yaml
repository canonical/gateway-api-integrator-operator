type: charm
base: ubuntu@24.04
build-base: ubuntu@24.04

platforms:
  amd64:
parts:
  charm:
    source: .
    plugin: uv
    build-snaps:
    - astral-uv
    build-packages:
      - build-essential
      - python3-dev
      - pkg-config
      - libffi-dev
      - libssl-dev

name: gateway-api-integrator
title: Gateway API Integrator
description: |
  A [Juju](https://juju.is/) [charm](https://juju.is/docs/olm/charmed-operators) deploying and managing external access to HTTP/HTTPS services in a
  Kubernetes cluster via a Gateway and an HTTPRoute resource. This requires the Kubernetes
  cluster in question to have an Gateway API controller already deployed into it.
summary: An operator to manage gateway resources.
links:
  documentation: https://canonical.com/juju/docs/gateway-api-integrator-charm/
  issues: https://github.com/canonical/gateway-api-integrator-operator/issues
  source: https://github.com/canonical/gateway-api-integrator-operator
  contact:
    - https://launchpad.net/~canonical-is-devops
assumes:
  - k8s-api
  - juju >= 3.3
requires:
  certificates:
    interface: tls-certificates
    limit: 1
  dns-record:
    interface: dns_record
provides:
  gateway:
    interface: ingress
    limit: 1
  gateway-route:
    interface: gateway-route

config:
  options:
    external-hostname:
      description: The hostname of the gateway.
      type: string
    gateway-class:
      description: The gateway class.
      type: string
    enforce-https:
      default: true
      description: |
        Whether to enforce HTTPS by redirecting HTTP traffic to HTTPS.
        When set to false, plain HTTP traffic on port 80 is allowed and the HTTPS listener is not created.
        Setting this to false also makes the external-hostname configuration optional.
      type: boolean
    hsts-max-age:
      default: 31536000
      description: |
        Value for the max-age directive of the Strict-Transport-Security header injected on HTTPS routes.
        Only applied when HTTPS is enforced. The default is 31536000 (1 year).
        Setting this to 0 instructs browsers to clear any cached HSTS policy.
      type: int


actions:
  get-certificate:
    description: Returns the TLS Certificate. Intended for testing and debugging purposes.
    params:
      hostname:
        type: string
        description: Hostname to extract certs from.

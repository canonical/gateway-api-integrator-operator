name: Publish the Gateway API Integrator charm to edge

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - 'gateway-api-integrator/**'

jobs:
  publish-to-edge:
    uses: canonical/charm-ci/.github/workflows/publish-artifacts.yml@main
    permissions:
      actions: read
      contents: write
    secrets:
      CHARMHUB_TOKEN: ${{ secrets.CHARMHUB_TOKEN }}
    with:
      channel: "1/edge"
      integration-workflow-name: integration_test.yaml
      working-directory: "."

project: gateway-api-integrator-operator
path: /home/ubuntu/proj
kill-timeout: 60m
warn-timeout: 1m
backends:
  integration-test-local:
    systems:
    - ubuntu-24.04:
        username: ubuntu
    type: adhoc
    allocate: |
      DISTRO=$(echo "$SPREAD_SYSTEM" | cut -d- -f1)
      SERIES=$(echo "$SPREAD_SYSTEM" | cut -d- -f2)
      VM_NAME="spread-${DISTRO}-${SERIES}-$$-${RANDOM}"
      VM_NAME=$(echo "$VM_NAME" | tr . -)

      DISK="${DISK:-20}"
      CPU="${CPU:-4}"
      MEM="${MEM:-8}"

      CLOUD_CONFIG=$(mktemp)
      cat > "$CLOUD_CONFIG" <<'ENDCLOUD'
      #cloud-config
      ssh_pwauth: true
      users:
        - name: ubuntu
          lock_passwd: false
          sudo: ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
      ENDCLOUD

      CLEANUP_VM=true
      cleanup() {
        rm -f "$CLOUD_CONFIG" 2>/dev/null || true
        if [ "$CLEANUP_VM" = true ] && [ -n "${VM_NAME:-}" ]; then
          lxc delete --force "${VM_NAME}" 2>/dev/null || true
        fi
      }
      trap cleanup EXIT

      lxc launch --vm \
        "${DISTRO}:${SERIES}" \
        "${VM_NAME}" \
        --config "user.user-data=$(cat "$CLOUD_CONFIG")" \
        --config "limits.cpu=${CPU}" \
        --config "limits.memory=${MEM}GiB" \
        --device "root,size=${DISK}GiB" >&2

      # Wait for LXD agent to be ready inside the VM
      while ! lxc exec "${VM_NAME}" -- true &>/dev/null; do sleep 0.5; done

      # Wait for cloud-init and snap seeding
      lxc exec "${VM_NAME}" -- cloud-init status --wait >&2
      lxc exec "${VM_NAME}" -- snap wait system seed.loaded >&2

      # Set ubuntu user password (using lxc exec to avoid YAML escaping issues)
      lxc exec "${VM_NAME}" -- bash -c "echo ubuntu:${SPREAD_PASSWORD} | chpasswd"

      # Enable SSH password authentication
      lxc exec "${VM_NAME}" -- bash -c \
        'if [ -d /etc/ssh/sshd_config.d ]; then
           printf "PasswordAuthentication yes\n" \
             > /etc/ssh/sshd_config.d/00-spread.conf
         fi'
      lxc exec "${VM_NAME}" -- sed -i \
        's/^\s*#\?\s*PasswordAuthentication\>.*/PasswordAuthentication yes/' \
        /etc/ssh/sshd_config
      lxc exec "${VM_NAME}" -- killall -HUP sshd 2>/dev/null || true

      # Get and report the VM's IPv4 address
      while true; do
        RAW_ADDR=$(lxc ls --format csv --columns 4 "name=${VM_NAME}" | head -1)
        ADDR=$(echo "$RAW_ADDR" | awk '{print $1}')
        if [ -n "$ADDR" ]; then
          CLEANUP_VM=false
          ADDRESS "$ADDR"
          break
        fi
        sleep 0.5
      done
    discard: |
      instance_name=$(lxc ls --format json   | jq -r --arg a "$SPREAD_SYSTEM_ADDRESS"     '.[] | select(any(
            .state.network[]?.addresses[]?; .address == $a
          )) | .name' | head -1)
      if [ -n "$instance_name" ]; then
        lxc delete --force "$instance_name"
      fi
    environment:
      SUDO_USER: ubuntu
    prepare: |
      loginctl enable-linger ubuntu
      snap install astral-uv --classic
      export UV_TOOL_BIN_DIR=/usr/local/bin
      export UV_TOOL_DIR=/usr/local/share/uv-tools
      if grep -q 'name = "opcli"' "${SPREAD_PATH}/pyproject.toml" 2>/dev/null; then
        uv tool install "opcli[cli] @ ${SPREAD_PATH}" --quiet
      else
        uv tool install       "opcli[cli] @ git+https://github.com/canonical/charm-ci@${OPCLI_GIT_REF:-main}"       --quiet
      fi
      opcli install spread
      opcli install tox
      opcli install concierge
      opcli env provision -c "$CONCIERGE"
      chown -R ubuntu:ubuntu /home/ubuntu
      usermod -aG lxd ubuntu || true
      opcli artifacts push-images --missing-registry deploy
      chown -R ubuntu:ubuntu "${SPREAD_PATH}"
environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge-juju3.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'
exclude:
- .git
- .tox
- .venv
- .*_cache
suites:
  build/gateway-api-integrator/tests/integration/:
    summary: gateway-api-integrator charm integration tests
    backends:
    - integration-test-local
    prepare: |
      mkdir -p /home/ubuntu/.kube
      k8s config > /home/ubuntu/.kube/config
      chown ubuntu:ubuntu /home/ubuntu/.kube/config
    environment:
      MODULE/test_actions: tests/integration/test_actions.py
      MODULE/test_charm_dns: tests/integration/test_charm_dns.py
      MODULE/test_charm_ingress_interface: 
        tests/integration/test_charm_ingress_interface.py
      OPCLI_SUITE: gateway-api-integrator/tests/integration/
      OPCLI_CWD: gateway-api-integrator/
  build/gateway-api-integrator/tests/integration-juju4/:
    summary: gateway-api-integrator charm integration tests (Juju 4)
    backends:
    - integration-test-local
    prepare: |
      mkdir -p /home/ubuntu/.kube
      k8s config > /home/ubuntu/.kube/config
      chown ubuntu:ubuntu /home/ubuntu/.kube/config
    environment:
      CONCIERGE: concierge-juju4.yaml
      MODULE/test_actions: tests/integration/test_actions.py
      MODULE/test_charm_dns: tests/integration/test_charm_dns.py
      MODULE/test_charm_ingress_interface: 
        tests/integration/test_charm_ingress_interface.py
      OPCLI_SUITE: gateway-api-integrator/tests/integration-juju4/
      OPCLI_CWD: gateway-api-integrator/
  build/tests/e2e/:
    summary: cross-charm e2e tests
    backends:
    - integration-test-local
    prepare: |
      mkdir -p /home/ubuntu/.kube
      k8s config > /home/ubuntu/.kube/config
      chown ubuntu:ubuntu /home/ubuntu/.kube/config
    environment:
      MODULE/test_configurator: tests/e2e/test_configurator.py
      OPCLI_SUITE: tests/e2e/
      OPCLI_CWD: ./
  build/tests/e2e-juju4/:
    summary: cross-charm e2e tests (Juju 4)
    backends:
    - integration-test-local
    prepare: |
      mkdir -p /home/ubuntu/.kube
      k8s config > /home/ubuntu/.kube/config
      chown ubuntu:ubuntu /home/ubuntu/.kube/config
    environment:
      CONCIERGE: concierge-juju4.yaml
      MODULE/test_configurator: tests/e2e/test_configurator.py
      OPCLI_SUITE: tests/e2e-juju4/
      OPCLI_CWD: ./

project: gateway-api-integrator-operator
path: /home/ubuntu/proj
kill-timeout: 60m
warn-timeout: 1m
backends:
  integration-test:
    type: integration-test
    systems:
    - ubuntu-24.04
environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge-juju3.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'
exclude:
- .git
- .tox
- .venv
- .*_cache
integration-suites:
  gateway-api-integrator/tests/integration/:
    summary: gateway-api-integrator charm integration tests
    working-dir: gateway-api-integrator/
    backends:
    - integration-test
    prepare: |
      mkdir -p /home/ubuntu/.kube
      k8s config > /home/ubuntu/.kube/config
      chown ubuntu:ubuntu /home/ubuntu/.kube/config
    pytest-arguments-template: '--kube-config=/home/ubuntu/.kube/config'
    environment:
      MODULE/test_actions_juju4: tests/integration/test_actions.py
      CONCIERGE/test_actions_juju4: concierge-juju4.yaml
      MODULE/test_charm_dns_juju4: tests/integration/test_charm_dns.py
      CONCIERGE/test_charm_dns_juju4: concierge-juju4.yaml
      MODULE/test_charm_ingress_interface_juju4: tests/integration/test_charm_ingress_interface.py
      CONCIERGE/test_charm_ingress_interface_juju4: concierge-juju4.yaml
  tests/e2e/:
    summary: cross-charm e2e tests
    working-dir: ./
    backends:
    - integration-test
    prepare: |
      mkdir -p /home/ubuntu/.kube
      k8s config > /home/ubuntu/.kube/config
      chown ubuntu:ubuntu /home/ubuntu/.kube/config
    pytest-arguments-template: '--kube-config=/home/ubuntu/.kube/config'
    environment:
      MODULE/test_configurator_juju4: tests/e2e/test_configurator.py
      CONCIERGE/test_configurator_juju4: concierge-juju4.yaml

name: Publish the Gateway Route Configurator charm to edge

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - 'gateway-route-configurator/**'

jobs:
  publish-to-edge:
    uses: canonical/operator-workflows/.github/workflows/publish_charm.yaml@main
    permissions:
      actions: read
      contents: write
    secrets: inherit
    with:
      working-directory: "./gateway-route-configurator"
      channel: "latest/edge"
      tag-prefix: "gateway-route"
